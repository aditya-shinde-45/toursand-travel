name: CI/CD

on:
  push:
    branches:
      - master
    paths:
      - Backend/**
      - .github/workflows/deploy.yml
  pull_request:
    branches:
      - master
    paths:
      - Backend/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

concurrency:
  group: backend-lambda-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  LAMBDA_FUNCTION_NAME: adityatoursandtravels
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-backend:
    name: Build Lambda Zip
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Build Lambda deployment zip
        working-directory: ./Backend
        run: npm ci && npm run build:lambda

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-lambda-zip
          path: Backend/.artifacts/aditya-tours-backend.zip
          if-no-files-found: error

  deploy-backend:
    name: Deploy Lambda Production
    runs-on: ubuntu-latest
    needs: package-backend
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-lambda-zip
          path: Backend/.artifacts

      - name: Validate AWS secret format
        env:
          AWS_ACCESS_KEY_ID_RAW: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_RAW: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          access_key_trimmed="$(printf '%s' "$AWS_ACCESS_KEY_ID_RAW" | tr -d '\r\n[:space:]')"
          secret_key_trimmed="$(printf '%s' "$AWS_SECRET_ACCESS_KEY_RAW" | tr -d '\r\n[:space:]')"

          if [ "$access_key_trimmed" != "$AWS_ACCESS_KEY_ID_RAW" ]; then
            echo "AWS_ACCESS_KEY_ID contains whitespace or newlines in GitHub secret." >&2
            exit 1
          fi

          if [ "$secret_key_trimmed" != "$AWS_SECRET_ACCESS_KEY_RAW" ]; then
            echo "AWS_SECRET_ACCESS_KEY contains whitespace or newlines in GitHub secret." >&2
            exit 1
          fi

          if ! printf '%s' "$AWS_ACCESS_KEY_ID_RAW" | grep -Eq '^AKIA[0-9A-Z]{16}$'; then
            echo "AWS_ACCESS_KEY_ID format is invalid." >&2
            exit 1
          fi

          secret_len=${#AWS_SECRET_ACCESS_KEY_RAW}
          if [ "$secret_len" -lt 40 ]; then
            echo "AWS_SECRET_ACCESS_KEY appears too short." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS identity
        run: |
          aws sts get-caller-identity

      - name: Validate target Lambda exists
        run: |
          aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" >/dev/null

      - name: Update Lambda configuration
        working-directory: ./Backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing GitHub secret: DATABASE_URL" >&2
            exit 1
          fi

          if [ -z "$JWT_SECRET" ]; then
            echo "Missing GitHub secret: JWT_SECRET" >&2
            exit 1
          fi

          jq -n \
            --arg nodeEnv production \
            --arg databaseUrl "$DATABASE_URL" \
            --arg jwtSecret "$JWT_SECRET" \
            --arg corsOrigin "$CORS_ORIGIN" \
            --arg frontendUrl "$FRONTEND_URL" \
            --arg smtpHost "$SMTP_HOST" \
            --arg smtpPort "$SMTP_PORT" \
            --arg smtpUser "$SMTP_USER" \
            --arg smtpPass "$SMTP_PASS" \
            --arg smtpFrom "$SMTP_FROM" \
            --arg adminUsername "$ADMIN_USERNAME" \
            --arg adminPassword "$ADMIN_PASSWORD" \
            '{
              Variables: {
                NODE_ENV: $nodeEnv,
                DATABASE_URL: $databaseUrl,
                JWT_SECRET: $jwtSecret,
                CORS_ORIGIN: $corsOrigin,
                FRONTEND_URL: $frontendUrl,
                SMTP_HOST: $smtpHost,
                SMTP_PORT: $smtpPort,
                SMTP_USER: $smtpUser,
                SMTP_PASS: $smtpPass,
                SMTP_FROM: $smtpFrom,
                ADMIN_USERNAME: $adminUsername,
                ADMIN_PASSWORD: $adminPassword
              }
            }' > lambda-environment.json

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --runtime nodejs20.x \
            --handler src/lambda.handler \
            --timeout 30 \
            --memory-size 512 \
            --environment file://lambda-environment.json

          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Deploy zip to Lambda
        working-directory: ./Backend
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://.artifacts/aditya-tours-backend.zip \
            --publish

          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME"
